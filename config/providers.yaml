# reliability: stable | fragile | manual_only
# Fragile providers work best-effort: they can break if the platform changes.
providers:
  youtube: { enabled: true, reliability: stable }
  web: { enabled: true, reliability: stable }
  pdf: { enabled: true, reliability: stable }
  localfile: { enabled: true, reliability: stable }
  tiktok:
    { enabled: true, reliability: fragile, notes: "yt-dlp best-effort; can break without notice" }
  instagram:
    {
      enabled: true,
      reliability: fragile,
      notes: "Public individual post/reel URLs only; authentication and cookie export are not supported",
    }
  twitter:
    {
      enabled: true,
      reliability: fragile,
      notes: "Text via FxTwitter + video via yt-dlp; public tweets only",
    }
  linkedin:
    {
      enabled: true,
      reliability: fragile,
      notes: "Public posts/articles only; behind the login wall, use analyze with filePath",
    }
