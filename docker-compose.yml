services:
  creator-research:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    env_file: [.env]
    environment:
      MCP_HTTP_PORT: 3333
      DATABASE_PATH: /app/data/creator-research.db
    ports:
      - "127.0.0.1:3333:3333"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  bridge:
    build:
      context: .
      dockerfile: docker/bridge.Dockerfile
    env_file: [.env]
    environment:
      CREATOR_RESEARCH_MCP_URL: http://creator-research:3333/mcp
      DASHBOARD_API_URL: http://creator-research:3333/api
      N8N_BRIDGE_PORT: 3334
      WHISPER_PYTHON: python3
      WHISPER_SCRIPT: /app/scripts/transcribe-audio.py
      HF_HUB_CACHE: /root/.cache/huggingface
    ports:
      - "127.0.0.1:3334:3334"
    volumes:
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      creator-research:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3334/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  n8n:
    build:
      context: .
      dockerfile: docker/n8n.Dockerfile
    env_file: [.env]
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  dashboard:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      creator-research:
        condition: service_healthy
      n8n:
        condition: service_started

volumes:
  n8n_data:
  whisper_cache:
